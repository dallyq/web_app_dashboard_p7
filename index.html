<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebApp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="grid-container">

    <header>
        <h1></h1>
        <div class="main-header" id="mainheader">
            <h2 class="headline">WebApp™</h2>
            <div class="tab"></div>
        </div>
        <img src="svgs/bell.svg" class="bell-svg" alt="bell image" style="width: 18px; height: 18px; fill:white">
            <!-- alert banner -->
             <div class="alert" id="alert">
                <!-- JS will insert alert here-->
            </div>
            <span class="header-divider"></span>
        <img src="images/member-1.jpg" class="member" alt="member image" style="width: 30px; height: 30px; border-radius: 50%;">
        <p class="student-name">Student Name</p> 
    </header>

    <div class="nav-links">
    <nav>
        <a href="#mainheader">
            <img src="svgs/home.svg" class="home-svg" alt="home image" style="width: 30px; height: 30px;">
        </a>
    </nav>
    <nav>
        <a href="#bargraph">
            <img src="svgs/bar-chart.svg" class="barchart-svg" alt="bar chart image" style="width: 30px; height: 30px;">
        </a>
    </nav>
    <nav>
        <a href="#newmembers">
            <img src="svgs/members.svg" class="members-svg" alt="members image" style="width: 30px; height: 30px;">
        </a>
    </nav>
    <nav>
        <a href="#settingscog">
            <img src="svgs/settings.svg" class="settings-svg" alt="settings image" style="width: 30px; height: 30px;">
        </a>
    </nav>
    </div>

    <main>
        <row>
            <col 1> 
        </row>
        <row>
            <col 1>
            <col 2>
        </row>

        <!-- line graph charts -->
         <section class="traffic">
            <div class="traffic-header">
                <h3>Traffic</h3>
                <ul class="traffic-nav">
                    <li class="traffic-nav-link">Hourly</li>
                    <li class="traffic-nav-link">Daily</li>
                    <li class="traffic-nav-link active">Weekly</li>
                    <li class="traffic-nav-link">Monthly</li>
                </ul>
            </div>
            <div class="widget-container-full">
                <!-- element line graph will attach to -->
                 <canvas id="traffic-chart"></canvas>
            </div>
         </section>

         <!-- bar graph -->
          <section class="daily" id="bargraph">
            <h3>Daily Traffic</h3>

            <div class="widget-container-half">
                <!-- element bar graph will attach to -->
                 <canvas id="daily-chart"></canvas>
            </div>
          </section>

          <!-- social status section -->
           <div class="social-container">
            <div class="social-image">
                <!-- inline SVG not included for brevity -->
            </div>
            <div class="social-text">
                <p>Twitter</p>
                <p>10,345</p>
            </div>
           </div>
           <!-- add two more social containers and child elements for 
            other social media items -->
         </div>
        </div>

        <!-- new members widget -->
        <section class="members" id="newmembers">
            <h3>New Members</h3>

            <div class="members-container">
                <img src="images/member-1.jpg" class="profile-image">
                <div class="members-text">
                    <p>Victoria Chambers</p>
                    <a href="#">victoria.chambers80@example.com</a>
                </div>
                <p>10/15/25</p>
            </div>
        </section>

        <!-- messaging widget -->
         <section class="message">
            <h3>Message User</h3>

            <form class="widget-container">
                <input type="text" placeholder="Search for user" 
                class="form-field" id="userField">
                <textarea placeholder="Message for user"
                class="form-area" id="messageField"></textarea>
                <button class="button-primary" id="send">Send</button>
            </form>
         </section>

         <!-- local storage widget -->
        <section class="settings" id="settingscog">
            <h3>Settings</h3>

            <!-- custom CSS toggle code -->

            <!-- custom CSS toggle code -->

            <select class="form-field" id="timezone">
                <option disabled selected>Select a Timezone</option>
                <option>Eastern</option>
                <!-- more options -->
            </select>
            <div class="settings-button">
                <button class="button-primary" id="save">Save</button>
                <button class="button-disabled" id="cancel">Cancel</button>
            </div>
        </section>

        
    </main>
    
</body>
</html>
