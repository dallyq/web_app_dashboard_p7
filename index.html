<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        .example {
            width: 200px;
            height: 200px;
            border: 3px solid red;
        }
    </style>
</head>
<body>

    <svg viewBox="0 0 100 100" class="example">
        <circle r="50" cx="50" cy="50"></circle>
    </svg>

    <header>
        <h1></h1>
        <div class="main-header">
            <h2 class="headline">Dashboard</h2>
            <div class="tab"></div>
        </div>
        <div>
            <sg></sg>
            <div id="#notifications"></div>
            <!-- alert banner -->
            <div class="alert" id="alert">
                <!-- JS will insert alert here-->
            </div>
        </div>
        <img>
        <h3></h3> 
    </header>

    <nav>
        <a>
            <img>
        </a>
    </nav>

    <main>
        <row>
            <col 1> 
        </row>
        <row>
            <col 1>
            <col 2>
        </row>

        <!-- line graph charts -->
         <section class="traffic">
            <div class="traffic-header">
                <h3>Traffic</h3>
                <ul class="traffic-nav">
                    <li class="traffic-nav-link">Hourly</li>
                    <li class="traffic-nav-link">Daily</li>
                    <li class="traffic-nav-link active">Weekly</li>
                    <li class="traffic-nav-link">Monthly</li>
                </ul>
            </div>
            <div class="widget-container-full">
                <!-- element line graph will attach to -->
                 <canvas id="traffic-chart"></canvas>
            </div>
         </section>

         <!-- bar graph -->
          <section class="daily">
            <h3>Daily Traffic</h3>

            <div class="widget-container-half">
                <!-- element bar graph will attach to -->
                 <canvas id="daily-chart"></canvas>
            </div>
          </section>

          <!-- social status section -->
           <div class="social-container">
            <div class="social-image">
                <!-- inline SVG not included for brevity -->
            </div>
            <div class="social-text">
                <p>Twitter</p>
                <p>10,345</p>
            </div>
           </div>
           <!-- add two more social containers and child elements for 
            other social media items -->
         </div>
        </div>

        <!-- new members widget -->
        <section class="members">
            <h3>New Members</h3>

            <div class="members-container">
                <img src="images/member-1.jpg" class="profile-image">
                <div class="members-text">
                    <p>Victoria Chambers</p>
                    <a href="#">victoria.chambers80@example.com</a>
                </div>
                <p>10/15/25</p>
            </div>
        </section>

        <!-- messaging widget -->
         <section class="message">
            <h3>Message User</h3>

            <form class="widget-container">
                <input type="text" placeholder="Search for user" 
                class="form-field" id="userField">
                <textarea placeholder="Message for user"
                class="form-area" id="messageField"></textarea>
                <button class="button-primary" id="send">Send</button>
            </form>
         </section>

    </main>
    
</body>
</html>
